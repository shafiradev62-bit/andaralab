version: '3.8'

services:
  # Frontend - Nginx serving Vite build
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - andaralab-network
    restart: unless-stopped

  # Backend - Express API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATA_DIR=/data
      - APP_DIR=/opt/andara-lab
      - DEPLOY_WEBHOOK_SECRET=${DEPLOY_WEBHOOK_SECRET:-}
    volumes:
      # PERMANENT bind mount — data lives at /opt/andaralab-data on the host.
      # Survives container rebuilds, image changes, project renames, domain moves.
      - /opt/andaralab-data:/data
      # App dir bind mount — allows webhook to git pull & write .deploy-trigger
      - /opt/andara-lab:/opt/andara-lab
    networks:
      - andaralab-network
    restart: unless-stopped

networks:
  andaralab-network:
    driver: bridge
