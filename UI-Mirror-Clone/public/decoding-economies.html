<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1536, height=1024" />
  <title>Decoding Economies, Empowering Growth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1536px;
      height: 1024px;
      background: url('gambar.png') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }

    .text {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.7);
      line-height: 1.25;
      font-size: 88px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .text .line1 {
      display: block;
    }

    .text .line2 {
      display: block;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="text">
    <span class="line1">Decoding Economies,</span>
    <span class="line2">Empowering Growth</span>
  </div>
</body>
</html>
